<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS 3D Weather Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at center,#001827,#000814);
color:white;
}

/* Animated Background */

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:
radial-gradient(circle,rgba(0,255,255,.15) 1px,transparent 1px);
background-size:40px 40px;
animation:moveBg 25s linear infinite;
}

@keyframes moveBg{
from{
transform:translate(0,0);
}
to{
transform:translate(-300px,-300px);
}
}

/* Main Container */

.jarvis{
position:relative;
z-index:2;

width:95%;
max-width:1200px;

padding:40px;

border-radius:40px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(20px);

box-shadow:
0 0 50px rgba(0,255,255,.4);

text-align:center;
}

/* Title */

.title{
font-size:3rem;
font-weight:700;
letter-spacing:3px;
color:#00f7ff;

text-shadow:
0 0 15px cyan,
0 0 30px cyan;
}

/* Rotating Ring */

.ring{
position:absolute;
top:50%;
left:50%;

transform:translate(-50%,-50%);

width:450px;
height:450px;

border-radius:50%;

border:2px solid rgba(0,255,255,.3);

animation:spin 20s linear infinite;
}

.ring::before{
content:"";
position:absolute;
inset:20px;

border-radius:50%;
border:2px dashed cyan;
}

@keyframes spin{
from{
transform:translate(-50%,-50%) rotate(0deg);
}
to{
transform:translate(-50%,-50%) rotate(360deg);
}
}

/* Search */

.search{
display:flex;
justify-content:center;
gap:20px;
margin:35px 0;
flex-wrap:wrap;
}

.search input{
width:320px;
padding:16px 20px;
border:none;
outline:none;

border-radius:50px;

background:
rgba(255,255,255,.08);

color:white;
font-size:16px;
}

.search button{

width:90px;
height:90px;

border:none;
cursor:pointer;

border-radius:50%;

background:
radial-gradient(circle,#00ffff,#0066ff);

color:white;

font-weight:700;

transition:.5s;

box-shadow:
0 0 30px cyan;
}

.search button:hover{

transform:
rotate(360deg)
scale(1.15);

box-shadow:
0 0 80px cyan;
}

/* Main Weather Circle */

.weather-circle{

width:320px;
height:320px;

margin:auto;

border-radius:50%;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

background:
rgba(255,255,255,.08);

box-shadow:
0 0 40px cyan,
inset 0 0 30px cyan;

animation:floating 5s ease-in-out infinite;
}

@keyframes floating{

0%,100%{
transform:translateY(0px);
}

50%{
transform:translateY(-15px);
}
}

.weather-circle img{
width:130px;
}

.city{
font-size:1.8rem;
margin-top:10px;
}

.temp{
font-size:4rem;
font-weight:700;
color:#ffd700;
text-shadow:
0 0 20px #ffd700;
}

/* Circular Cards */

.cards{

display:flex;
justify-content:center;
gap:30px;

flex-wrap:wrap;

margin-top:40px;
}

.card{

width:180px;
height:180px;

border-radius:50%;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

background:
rgba(255,255,255,.08);

box-shadow:
0 0 25px cyan;

transition:.5s;
}

.card:hover{

transform:
rotateY(20deg)
translateY(-10px);

box-shadow:
0 0 60px cyan;
}

.card h3{
color:#00f7ff;
margin-bottom:10px;
}

.card span{
font-size:1.2rem;
font-weight:600;
}

/* Error */

#error{
margin-top:20px;
color:#ff5e5e;
font-weight:600;
}

/* Mobile */

@media(max-width:768px){

.title{
font-size:2rem;
}

.weather-circle{
width:260px;
height:260px;
}

.temp{
font-size:3rem;
}

.card{
width:150px;
height:150px;
}
}

</style>
</head>

<body>

<div class="jarvis">

<div class="ring"></div>

<h1 class="title">
JARVIS WEATHER AI
</h1>

<div class="search">

<input
type="text"
id="cityInput"
placeholder="Enter City Name">

<button onclick="getWeather()">
GO
</button>

</div>

<div class="weather-circle">

<img
id="weatherIcon"
src="https://cdn-icons-png.flaticon.com/512/1163/1163661.png">

<div
class="city"
id="cityName">
Search City
</div>

<div
class="temp"
id="temp">
--°C
</div>

</div>

<div class="cards">

<div class="card">
<h3>Humidity</h3>
<span id="humidity">--%</span>
</div>

<div class="card">
<h3>Wind</h3>
<span id="wind">-- km/h</span>
</div>

<div class="card">
<h3>Condition</h3>
<span id="condition">---</span>
</div>

</div>

<div id="error"></div>

</div>

<script>

async function getWeather(){

    const city =
    document.getElementById("cityInput").value;

    const error =
    document.getElementById("error");

    if(city === ""){

        error.innerText =
        "Please enter city name";

        return;
    }

    try{

        error.innerText = "";

        const apiKey =
        "9ba0d336b1028d1ccb8c20b60569c3e9";

        const response =
        await fetch(

        `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`

        );

        const data =
        await response.json();

        /* ERROR CHECK */

        if(data.cod != 200){

            error.innerText =
            data.message;

            return;
        }

document.getElementById("cityName").innerHTML =
data.name;

document.getElementById("temp").innerHTML =
Math.round(data.main.temp) + "°C";

document.getElementById("humidity").innerHTML =
data.main.humidity + "%";

document.getElementById("wind").innerHTML =
data.wind.speed + " km/h";

document.getElementById("condition").innerHTML =
data.weather[0].main;

document.getElementById("weatherIcon").src =
`https://openweathermap.org/img/wn/${data.weather[0].icon}@4x.png`;

}
catch(err){

error.innerHTML =
"Failed to fetch weather data";

console.log(err);
}

}

</script>

</body>
</html>
